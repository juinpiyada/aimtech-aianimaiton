<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Aimax Studio</title>

    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- CSS Variables & Reset --- */
        :root {
            --primary-blue: #0A84FF;
            --deep-blue: #1E3A8A;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            --gradient-main: linear-gradient(135deg, #0A84FF 0%, #1E3A8A 100%);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            background-color: #f0f4f8;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- Split Layout --- */
        .split-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- Left Side: Branding & Animation --- */
        .left-branding {
            flex: 1;
            background: linear-gradient(135deg, var(--deep-blue) 0%, #0f172a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            color: var(--white);
        }

        /* Ambient Background Effects */
        .ambient-glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: floatGlow 10s infinite alternate ease-in-out;
        }
        .glow-1 {
            width: 400px;
            height: 400px;
            background: var(--primary-blue);
            top: -100px;
            left: -100px;
        }
        .glow-2 {
            width: 300px;
            height: 300px;
            background: #4f46e5;
            bottom: -50px;
            right: -50px;
            animation-delay: 2s;
        }

        /* Branding Content */
        .brand-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
        }

        .logo-large {
            font-family: 'Poppins', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .logo-large img {
            height: 100px;
            width: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .tagline {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 400px;
            margin: 0 auto 50px;
            font-weight: 300;
        }

        /* Cinematic Animation: Spinning Film Reel */
        .animation-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 0 auto;
        }

        .film-reel {
            width: 100%;
            height: 100%;
            border: 10px dashed rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: spin 20s linear infinite;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 30px rgba(10, 132, 255, 0.1);
        }

        .film-reel::before {
            content: '';
            position: absolute;
            inset: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .film-reel::after {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            border-top-color: var(--primary-blue);
            border-radius: 50%;
            animation: spin 5s linear infinite reverse;
            opacity: 0.5;
        }

        .film-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(10, 132, 255, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 3;
        }

        /* --- Right Side: Form --- */
        .right-form {
            flex: 1;
            background: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
            overflow: hidden;
        }

        .soft-blue-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(10, 132, 255, 0.2) 0%, rgba(255,255,255,0) 70%);
            border-radius: 50%;
            z-index: 0;
            animation: breathe 6s infinite ease-in-out;
        }

        /* Glassmorphism Card */
        .glass-card {
            width: 100%;
            max-width: 460px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 24px;
            padding: 40px;
            z-index: 1;
            position: relative;
            animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .form-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .form-header h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            color: var(--deep-blue);
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 6px;
            margin-left: 2px;
        }

        .input-field {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.8);
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: var(--text-dark);
            transition: var(--transition);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.1);
            background: white;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 38px;
            color: #94a3b8;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .input-field:focus + .input-icon, 
        .input-field:focus ~ .input-icon {
            color: var(--primary-blue);
        }

        .terms-group {
            margin-bottom: 25px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            font-size: 0.85rem;
            color: var(--text-light);
        }

        .terms-group input {
            margin-top: 3px;
            accent-color: var(--primary-blue);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .terms-group a {
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .btn-signup {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--gradient-main);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(10, 132, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn-signup::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .btn-signup:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(10, 132, 255, 0.4);
        }

        .btn-signup:hover::after {
            left: 100%;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #cbd5e1;
        }

        .divider span {
            padding: 0 10px;
        }

        /* Social Buttons */
        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: white;
            color: var(--text-dark);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .social-btn i {
            font-size: 1.1rem;
        }

        .social-btn:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
            transform: translateY(-1px);
        }

        .social-btn.google:hover i { color: #DB4437; }
        .social-btn.linkedin:hover i { color: #0077B5; }

        .form-footer {
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .form-footer a {
            color: var(--primary-blue);
            font-weight: 600;
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* --- Animations --- */
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulseIcon { 0%, 100% { transform: scale(1); text-shadow: 0 0 10px rgba(10,132,255,0.5); } 50% { transform: scale(1.1); text-shadow: 0 0 25px rgba(10,132,255,0.8); } }
        @keyframes floatGlow { 0% { transform: translate(0, 0); } 100% { transform: translate(30px, 20px); } }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Responsive --- */
        @media (max-width: 900px) {
            .left-branding { display: none; }
            .right-form { background: linear-gradient(180deg, #f0f9ff 0%, #ffffff 100%); padding: 20px; }
            .soft-blue-glow { width: 300px; height: 300px; }
            .glass-card { background: rgba(255, 255, 255, 0.9); box-shadow: 0 10px 40px rgba(0,0,0,0.08); }
            body { overflow-y: auto; height: auto; min-height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="split-container">
        
        <!-- Left Side: Branding Animation -->
        <div class="left-branding">
            <div class="ambient-glow glow-1"></div>
            <div class="ambient-glow glow-2"></div>
            
            <div class="brand-content">
                <a href="index.html" class="logo-large" style="text-decoration:none; color:white;">
                    <img src="assets/logo.png" alt="Aimax Studio Logo">
                    <span>Aimax Studio</span>
                </a>
                <p class="tagline">Join the creative revolution. Let's bring your stories to life.</p>
                
                <div class="animation-container">
                    <div class="film-reel"></div>
                    <div class="film-center">
                        <i class="fa-solid fa-clapperboard" style="color: white; font-size: 1.4rem;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: Sign Up Form -->
        <div class="right-form">
            <div class="soft-blue-glow"></div>
            
            <div class="glass-card">
                <div class="form-header">
                    <h2>Create Account</h2>
                    <p>Join Aimax Studio to start your creative journey.</p>
                </div>

                <form id="signupForm" onsubmit="handleSignup(event)">
                    <!-- Full Name -->
                    <div class="input-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" class="input-field" placeholder="John Doe" required>
                        <i class="fa-regular fa-user input-icon"></i>
                    </div>

                    <!-- Email -->
                    <div class="input-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="input-field" placeholder="name@company.com" required>
                        <i class="fa-regular fa-envelope input-icon"></i>
                    </div>

                    <!-- Password -->
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="input-field" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>

                    <!-- Confirm Password -->
                    <div class="input-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" class="input-field" placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" required>
                        <i class="fa-solid fa-lock input-icon"></i>
                    </div>

                    <!-- Terms & Conditions -->
                    <div class="terms-group">
                        <input type="checkbox" id="terms" required>
                        <label for="terms" style="margin:0; font-weight:400;">I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>.</label>
                    </div>

                    <!-- CTA Button -->
                    <button type="submit" class="btn-signup">Create Account</button>
                </form>

                <!-- Divider -->
                <div class="divider">
                    <span>Or sign up with</span>
                </div>

                <!-- Social Login -->
                <div class="social-login">
                    <div class="social-btn google" onclick="socialLogin('Google')">
                        <i class="fa-brands fa-google"></i> Google
                    </div>
                    <div class="social-btn linkedin" onclick="socialLogin('LinkedIn')">
                        <i class="fa-brands fa-linkedin-in"></i> LinkedIn
                    </div>
                </div>

                <!-- Footer -->
                <div class="form-footer">
                    Already have an account? <a href="login.html">Log In</a>
                </div>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD-XOkvwPPIVzJ7gxCJd-tnX0vVWTjNhgs",
            authDomain: "aimax-studio.firebaseapp.com",
            databaseURL: "https://aimax-studio-default-rtdb.firebaseio.com",
            projectId: "aimax-studio",
            storageBucket: "aimax-studio.firebasestorage.app",
            messagingSenderId: "328019026496",
            appId: "1:328019026496:web:4d53f676066912ba55b5a5",
            measurementId: "G-7CSP0W7J4X"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Standard signup handler exposed to window for inline onclick use
        window.handleSignup = function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const btn = document.querySelector('.btn-signup');

            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            const originalText = btn.innerText;
            btn.innerText = 'Creating Account...';
            btn.style.opacity = '0.8';
            btn.disabled = true;

            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.opacity = '1';
                btn.disabled = false;
                alert("Account created successfully! Welcome to Aimax Studio.");
            }, 1500);
        };

        // Social login handler exposed to window
        window.socialLogin = function(platform) {
            if (platform === 'Google') {
                signInWithPopup(auth, provider)
                    .then((result) => {
                        const user = result.user;
                        alert("Successfully signed in with Google as: " + user.displayName);
                        // Redirect logic here if needed
                        // window.location.href = 'dashboard.html';
                    }).catch((error) => {
                        console.error('Google Sign-In Error:', error);
                        alert("Google Sign-In Failed: " + error.message);
                    });
            } else {
                alert(`Connecting to ${platform}...`);
            }
        };
    </script>
</body>
</html>

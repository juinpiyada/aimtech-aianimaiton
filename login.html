<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aimax Studio</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

    <style>
        /* --- CSS Variables & Reset --- */
        :root {
            --black: #0a0a0a;
            --dark-red: #bf0a1e;
            --bright-red: #de372e;
            --white: #ffffff;
            --text-dark: #ffffff;
            --text-light: #a0aec0;
            --bg-dark-card: #141414;
            --gradient-main: linear-gradient(135deg, #de372e 0%, #bf0a1e 100%);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            background-color: var(--black);
            height: 100vh;
            overflow: hidden; /* Prevent scrolling on desktop */
            display: flex;
        }

        /* --- Split Layout --- */
        .split-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* --- Left Side: Branding & Animation --- */
        .left-branding {
            flex: 1;
            background: linear-gradient(135deg, var(--black) 0%, #111 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            color: var(--white);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        /* Ambient Background Effects */
        .ambient-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: var(--primary-blue);
            filter: blur(150px);
            opacity: 0.2;
            border-radius: 50%;
            animation: floatGlow 10s infinite alternate;
        }
        .glow-1 { top: -100px; left: -100px; }
        .glow-2 { bottom: -100px; right: -100px; animation-delay: 5s; background: #4f46e5; }

        /* Branding Content */
        .brand-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 40px;
        }

        .logo-large {
            font-family: 'Poppins', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .logo-large img {
            height: 100px;
            width: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .tagline {
            font-size: 1.2rem;
            opacity: 0.8;
            max-width: 400px;
            margin: 0 auto 40px;
            font-weight: 300;
        }

        /* Cinematic Animation (Film Reel) */
        .animation-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }

        .film-reel {
            width: 100%;
            height: 100%;
            border: 8px dashed rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: spin 20s linear infinite;
            position: absolute;
            top: 0;
            left: 0;
        }

        .film-reel::before {
            content: '';
            position: absolute;
            inset: 15px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .film-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(222, 55, 46, 0.5);
        }

        .right-form {
            flex: 1;
            background: var(--black);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 20px;
        }

        /* Soft Red Glow behind card */
        .soft-red-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--bright-red);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 0;
        }

        /* Glassmorphism Card */
        .glass-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 24px;
            padding: 40px;
            z-index: 1;
            position: relative;
            animation: slideUp 0.8s ease-out;
        }

        .form-header {
            margin-bottom: 30px;
            text-align: center;
        }

        .form-header h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            color: var(--white);
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-light);
            font-size: 0.95rem;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-google:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-google i {
            color: #ea4335; /* Google Red/Orange for slight pop, or can stay white */
            font-size: 1.2rem;
        }

        .form-footer {
            text-align: center;
            margin-top: 25px;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .form-footer a {
            color: var(--bright-red);
            font-weight: 600;
            text-decoration: none;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        /* --- Animations --- */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseIcon {
            0%, 100% { transform: scale(1); text-shadow: 0 0 10px rgba(222, 55, 46,0.5); }
            50% { transform: scale(1.1); text-shadow: 0 0 20px rgba(222, 55, 46,0.8); }
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0); }
            100% { transform: translate(20px, 40px); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .left-branding { display: none; }
            .right-form { 
                background: var(--black);
            }
            .glass-card {
                background: rgba(255,255,255,0.05); /* Fallback for mobile if blur is heavy */
                backdrop-filter: none;
                border: 1px solid rgba(255,255,255,0.1);
            }
        }
    </style>
</head>
<body>

    <div class="split-container">
        
        <!-- Left Side: Branding Animation -->
        <div class="left-branding">
            <div class="ambient-glow glow-1"></div>
            <div class="ambient-glow glow-2"></div>
            
            <div class="brand-content">
                <a href="index.html" class="logo-large" style="text-decoration:none; color:white;">
                    <img src="assets/logo.png" alt="Aimax Studio Logo">
                    <span>Aimax Studio</span>
                </a>
                <p class="tagline">Bringing brands & stories to life through cinematic animation.</p>
                
                <!-- CSS Animation: Film Reel -->
                <div class="animation-container">
                    <div class="film-reel"></div>
                    <div class="film-center">
                        <i class="fa-solid fa-play" style="color: white; font-size: 1.2rem;"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="right-form">
            <div class="soft-red-glow"></div>
            
            <div class="glass-card">
                <div class="form-header">
                    <h2>Welcome Back</h2>
                    <p>Log in securely using your Google account.</p>
                </div>

                <!-- Social Login Button -->
                <button type="button" class="btn-google" onclick="window.socialLogin('Google')">
                    <i class="fa-brands fa-google"></i>
                    Continue with Google
                </button>

                <!-- Footer -->
                <div class="form-footer">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </div>
            </div>
        </div>

    </div>

    <!-- Toastify JS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD-XOkvwPPIVzJ7gxCJd-tnX0vVWTjNhgs",
            authDomain: "aimax-studio.firebaseapp.com",
            databaseURL: "https://aimax-studio-default-rtdb.firebaseio.com",
            projectId: "aimax-studio",
            storageBucket: "aimax-studio.firebasestorage.app",
            messagingSenderId: "328019026496",
            appId: "1:328019026496:web:4d53f676066912ba55b5a5",
            measurementId: "G-7CSP0W7J4X"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Social login handler exposed to window
        window.socialLogin = function(platform) {
            if (platform === 'Google') {
                signInWithPopup(auth, provider)
                    .then((result) => {
                        const user = result.user;
                        
                        // Save to localStorage
                        localStorage.setItem('user', JSON.stringify({
                            displayName: user.displayName,
                            email: user.email,
                            photoURL: user.photoURL
                        }));

                        Toastify({
                            text: `Successfully signed in as ${user.displayName}!`,
                            duration: 1500,
                            gravity: "bottom",
                            position: "center",
                            style: {
                                background: "#0a0a0a",
                                borderRadius: "8px",
                                padding: "16px",
                            }
                        }).showToast();

                        // Redirect to index
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1500);

                    }).catch((error) => {
                        console.error('Google Sign-In Error:', error);
                        Toastify({
                            text: `Google Sign-In Failed: ${error.message}`,
                            duration: 3000,
                            gravity: "bottom",
                            position: "center",
                            style: { background: "#e84118", borderRadius: "8px", padding: "16px" }
                        }).showToast();
                    });
            } else {
                Toastify({
                    text: `Connecting to ${platform}...`,
                    duration: 2000,
                    gravity: "bottom",
                    position: "center",
                    style: { background: "#0a0a0a", borderRadius: "8px", padding: "16px" }
                }).showToast();
            }
        };
    </script>
</body>
</html>
